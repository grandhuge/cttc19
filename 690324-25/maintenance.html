<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon - ยังไม่เปิดให้บริการ</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* ตั้งค่าพื้นฐาน */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); /* พื้นหลังแบบไล่สี */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            padding: 20px;
        }

        /* กล่องเนื้อหาหลัก */
        .container {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 600px;
            width: 100%;
            animation: fadeIn 1s ease-in-out;
        }

        /* ไอคอนหรือกราฟิก (ใช้อักษรแทนเพื่อความเบาของไฟล์) */
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        h1 {
            font-size: 2.5rem;
            color: #2d3748;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        p {
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        /* ปุ่มกลับหน้าหลัก */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background-color: #764ba2;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.3);
        }

        .btn:hover {
            background-color: #5a3780;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(118, 75, 162, 0.4);
        }

        /* Animation เล็กน้อย */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-20px);}
            60% {transform: translateY(-10px);}
        }

        /* ปรับขนาดสำหรับมือถือ */
        @media (max-width: 480px) {
            .container {
                padding: 2rem;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🚧</div>
        <h1>ขออภัยในความไม่สะดวก</h1>
        <p>
            หน้าเว็บไซต์นี้กำลังอยู่ระหว่างการพัฒนาและปรับปรุงระบบ<br>
            เรากำลังรีบดำเนินการเพื่อให้กลับมาใช้งานได้โดยเร็วที่สุด
        </p>
        <p style="font-size: 0.9rem; color: #a0aec0;">
            Coming Soon | Website Under Construction
        </p>
        
        <a href="javascript:void(0)" class="btn" onclick="window.close()">ปิดหน้านี้</a>
    </div>

</body>
</html>
