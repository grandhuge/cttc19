<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ปิดระบบแก้ไขข้อมูล</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        softblue: '#a6d8f5',
                        softmint: '#c3f0d4',
                        softpink: '#ffd6e0',
                        softpurple: '#e5d4f0',
                        softorange: '#ffe0b2', // เพิ่มสีส้มอ่อน
                    },
                    fontFamily: {
                        prompt: ['Prompt', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Prompt', sans-serif; }
        .fade-in { animation: fadeIn 0.8s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col justify-center items-center px-4">

    <div class="bg-white rounded-2xl shadow-xl p-8 md:p-12 max-w-lg w-full text-center border-t-8 border-orange-400 fade-in">
        
        <div class="mb-6 relative inline-block">
            <div class="w-24 h-24 bg-orange-50 rounded-full flex items-center justify-center mx-auto">
                <i class="fas fa-user-edit text-5xl text-orange-400"></i>
            </div>
            <div class="absolute bottom-0 right-0 bg-white rounded-full p-2 border-4 border-white shadow-sm">
                <i class="fas fa-lock text-xl text-gray-500"></i>
            </div>
        </div>

        <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-3">
            ปิดระบบแก้ไขข้อมูล
        </h1>
        <p class="text-gray-600 mb-2">
            หมดระยะเวลาสำหรับการแจ้งแก้ไขข้อมูลผู้ลงทะเบียนแล้ว
        </p>
        <p class="text-xs text-orange-500 font-medium mb-8 bg-orange-50 inline-block px-3 py-1 rounded-full">
            (Editing period has ended)
        </p>

        <div class="bg-gray-50 rounded-lg p-4 mb-8 text-sm text-gray-500 text-left border-l-4 border-gray-300">
            <p class="mb-1"><i class="fas fa-info-circle mr-1"></i> <strong>คำแนะนำ:</strong></p>
            <p>หากข้อมูลของท่านมีความผิดพลาดร้ายแรง (เช่น ชื่อ-สกุลผิด) กรุณาติดต่อเจ้าหน้าที่หรือผู้ประสานงานโดยตรง</p>
        </div>

        <div class="space-y-3">
            <a href="result.html" class="block w-full bg-orange-400 hover:bg-orange-500 text-white font-bold py-3 px-6 rounded-xl transition duration-300 shadow-sm hover:shadow-md">
                <i class="fas fa-list-alt mr-2"></i>ตรวจสอบรายชื่อ
            </a>
            
            <a href="index.html" class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 px-6 rounded-xl transition duration-300">
                <i class="fas fa-home mr-2"></i>กลับหน้าหลัก
            </a>
        </div>
    </div>

    <div class="mt-8 text-center text-gray-500 text-sm">
        <p>© developed by Tle Narongphisit | CTTC20 @ CPD</p>
    </div>

</body>
</html>
